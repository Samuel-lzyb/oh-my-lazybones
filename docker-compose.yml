# All-in-one Docker Compose for self-hosted deployment
#   docker compose --profile full up -d   → API + Web UI + MySQL + Meilisearch
#   docker compose up -d                  → API + MySQL + Meilisearch only
#   Access: http://localhost

services:
  # ── MySQL ──
  mysql:
    image: mysql:8.0
    container_name: lazybones-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: lazybones-dev
      MYSQL_DATABASE: lazybones
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Meilisearch ──
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: lazybones-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: dev-master-key
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: lazybones-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://root:lazybones-dev@mysql:3306/lazybones
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: dev-master-key
      ENVIRONMENT: production
    depends_on:
      mysql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Web UI + Nginx (full profile) ──
  nginx:
    image: nginx:alpine
    container_name: lazybones-web
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "9527:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/selfhost.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mysql_data:
  meili_data:
