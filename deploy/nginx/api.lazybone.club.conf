# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.lazybone.club;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.lazybone.club;

    ssl_certificate     /etc/letsencrypt/live/api.lazybone.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lazybone.club/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/lazybone-api.access.log;
    error_log  /var/log/nginx/lazybone-api.error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
