name: Bug Report
description: Report a bug
labels: [bug, triage]
body:
  - type: input
    attributes:
      label: Environment
      description: OS / Python version / lazy version
      placeholder: "macOS 14.5, Python 3.12, lazy 0.1.0"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Paste exact commands to reproduce the issue
      placeholder: |
        1. lazy search "email"
        2. lazy install daily-digest
        3. ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs / Screenshots
      description: Any relevant logs or screenshots
