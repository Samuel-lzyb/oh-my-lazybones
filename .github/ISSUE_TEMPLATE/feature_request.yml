name: Feature Request
description: What should your Agent be able to do?
labels: [enhancement, triage]
body:
  - type: textarea
    attributes:
      label: What do you want your Agent to do?
      description: Describe what you want in plain English
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why can't existing Skills do this?
      description: What's missing from the current Skill catalog?
  - type: textarea
    attributes:
      label: Ideal one-command experience
      description: "What happens after `lazy install your-skill`?"
      placeholder: "lazy install weekly-report → opens config → runs on schedule"
