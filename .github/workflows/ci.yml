name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check server/ cli/

  test:
    runs-on: ubuntu-latest
    services:
      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: test-key
        ports: ["7700:7700"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r server/requirements.txt pip-audit
      - run: pip install -e cli/
      - run: PYTHONPATH=. pytest --cov=server --cov-fail-under=70 --cov-report=term -v
        env:
          MEILI_URL: http://localhost:7700
          MEILI_KEY: test-key
      - run: pip-audit --ignore-vuln PYSEC-*
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: python }
      - uses: github/codeql-action/analyze@v3

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .env not committed
        run: |
          if git ls-files | grep -q '^.env$'; then
            echo "ERROR: .env file committed!" && exit 1
          fi