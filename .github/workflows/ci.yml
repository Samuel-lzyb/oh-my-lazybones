name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check server/ cli/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    services:
      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: test-key
        ports: ["7700:7700"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - run: pip install -r server/requirements.txt
      - run: pip install -e cli/
      - run: PYTHONPATH=. pytest --cov=server --cov-fail-under=70 --cov-report=term -v --ignore=scripts/
        env:
          MEILI_URL: http://localhost:7700
          MEILI_KEY: test-key

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r server/requirements.txt pip-audit
      - run: pip-audit --ignore-vuln PYSEC-*
        continue-on-error: true

  mcp-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r server/requirements.txt
      - run: pip install -e cli/
      # Create minimal frontend_dist so lazy serve doesn't try npm build
      - run: |
          mkdir -p cli/lazybones/frontend_dist
          echo '<html><body>CI Smoke</body></html>' > cli/lazybones/frontend_dist/index.html
      - run: |
          lazy serve --port 19527 &
          sleep 5
          PYTHONPATH=. python tests/test_mcp_smoke.py
          kill %1

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: python }
      - uses: github/codeql-action/analyze@v3

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .env not committed
        run: |
          if git ls-files | grep -q '^.env$'; then
            echo "ERROR: .env file committed!" && exit 1
          fi