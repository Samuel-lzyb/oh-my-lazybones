name: Issue Triage
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto-label by content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();

            const labels = [];

            // Detect type from content
            if (/\b(bug|broken|error|crash|fail|doesn't work|not working)\b/.test(title + body)) {
              labels.push('bug');
            }
            if (/\b(feature|request|wish|would be nice|can you add|please add)\b/.test(title + body)) {
              labels.push('enhancement');
            }
            if (/\b(question|how do i|how to|what is|help)\b/.test(title + body)) {
              labels.push('question');
            }
            if (/\b(doc|typo|readme|documentation)\b/.test(title + body)) {
              labels.push('documentation');
            }

            // Good first issue heuristic: short, clear title + "help wanted" vibe
            if (issue.title && issue.title.length < 60 && /\b(help|how|newbie|beginner)\b/.test(title)) {
              labels.push('good first issue');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
              console.log(`Applied labels: ${labels.join(', ')}`);
            } else {
              console.log('No labels matched');
            }

      - name: Auto-reply acknowledgment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            const reply = `Thanks for opening this issue! 🎉

            🤖 An automated triage has run:
            - We'll review this within 48 hours.
            - If this is a bug, please make sure you've included steps to reproduce.
            - If this is a feature request, it will be tagged and prioritized.

            In the meantime, check out:
            - [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md)
            - [Existing discussions](https://github.com/${context.repo.owner}/${context.repo.repo}/discussions)`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: reply
            });

      - name: Notify Hermes for AI triage
        if: env.HERMES_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${HERMES_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg event issue_opened --argjson issue '${{ toJson(github.event.issue) }}' \
              '{event: $event, repo: "${{ github.repository }}", issue: $issue}')" \
          || echo "Webhook notification skipped (endpoint unreachable)"
